services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: concierge
      POSTGRES_PASSWORD: concierge
      POSTGRES_DB: concierge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concierge -d concierge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
    volumes:
      - ./vault/init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application services ────────────────────────────────────────────────────

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_ROOT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      DEV_MODE: "false"
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: "concierge-api"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  modelserver:
    build:
      context: ./modelserver
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      VAULT_ADDR: http://vault:8200
    depends_on:
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  guardrails:
    build:
      context: ./guardrails
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_ROOT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      GUARDRAILS_SERVICE_TOKEN: ""
    depends_on:
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_ROOT_TOKEN: ${VAULT_ROOT_TOKEN:-dev-root-token}
      DEV_MODE: "false"
    depends_on:
      api:
        condition: service_healthy
    entrypoint: ["sh", "-c", "python -m seeds.marios_pizza && python -m seeds.lawson_partners"]
    restart: "no"

  widget-build:
    image: node:20-alpine
    working_dir: /widget
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: concierge-widget
    entrypoint:
      - sh
      - -c
      - "wget -q https://dl.min.io/client/mc/release/linux-amd64/mc -O /usr/local/bin/mc && chmod +x /usr/local/bin/mc && npm ci --silent && npm run build && sh scripts/upload-bundle.sh && mc anonymous set download minio/concierge-widget"
    volumes:
      - ./widget:/widget
    depends_on:
      minio:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    restart: "no"

  demo:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./demo:/usr/share/nginx/html:ro
    depends_on:
      - minio

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      VAULT_ADDR: http://vault:8200
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
