name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint stub
        run: echo "Lint stub — Owner D to implement"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build stub
        run: echo "Build stub — Owner D to implement"

  gates:
    name: Eval Gates
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Gates stub
        run: echo "Eval gates stub — Owner D to implement (reads eval_thresholds.yaml)"
